<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitt Kök</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #ff6b35;
    --orange-light: #fff0eb;
    --orange-mid: #ffd5c2;
    --black: #111111;
    --gray-1: #f7f7f7;
    --gray-2: #eeeeee;
    --gray-3: #bbbbbb;
    --gray-4: #888888;
    --white: #ffffff;
    --radius-sm: 12px;
    --radius-md: 18px;
    --radius-lg: 26px;
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f0ede8;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0;
  }

  .app {
    background: var(--white);
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    padding: 36px 24px 0;
    flex-shrink: 0;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .logo {
    font-family: 'Raleway', sans-serif;
    font-weight: 700;
    font-size: 1.15rem;
    letter-spacing: 0.01em;
    color: var(--black);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .logo-dot {
    width: 10px; height: 10px;
    background: var(--orange);
    border-radius: 50%;
  }
  .avatar-btn {
    width: 44px; height: 44px;
    background: var(--orange-light);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s var(--ease-spring);
  }
  .avatar-btn:hover { transform: scale(1.1); }

  /* ── NAV TABS ── */
  .nav {
    display: flex;
    gap: 4px;
    background: var(--gray-1);
    border-radius: 14px;
    padding: 4px;
    margin: 0 24px 24px;
    flex-shrink: 0;
  }
  .nav-btn {
    flex: 1;
    padding: 9px 6px;
    border: none;
    border-radius: 11px;
    background: transparent;
    font-family: 'Raleway', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--gray-4);
    cursor: pointer;
    transition: all 0.2s var(--ease-out);
    white-space: nowrap;
  }
  .nav-btn.active {
    background: var(--white);
    color: var(--black);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .screen.active { display: flex; animation: fadeIn 0.3s var(--ease-out); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .screen-scroll { overflow-y: auto; flex: 1; padding-bottom: 24px; }
  .screen-scroll::-webkit-scrollbar { display: none; }

  /* ── SECTION LABEL ── */
  .section-label {
    font-family: 'Raleway', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gray-3);
    padding: 0 24px;
    margin-bottom: 10px;
  }

  /* ── GROCERY LIST ── */
  .grocery-header { padding: 0 24px 20px; }
  .grocery-title {
    font-family: 'Raleway', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--black);
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .grocery-sub { font-size: 0.82rem; color: var(--gray-4); }

  .grocery-add {
    display: flex;
    gap: 8px;
    padding: 0 24px 20px;
  }
  .grocery-input {
    flex: 1;
    background: var(--gray-1);
    border: none;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--black);
    outline: none;
    transition: background 0.2s;
  }
  .grocery-input:focus { background: var(--gray-2); }
  .grocery-input::placeholder { color: var(--gray-3); }
  .add-btn {
    background: var(--orange);
    border: none;
    border-radius: var(--radius-sm);
    width: 52px;
    align-self: stretch;
    color: #fff;
    font-size: 1.4rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s var(--ease-spring), background 0.15s;
    flex-shrink: 0;
  }
  .add-btn:hover { transform: scale(1.08); background: #e85a24; }

  .grocery-list { padding: 0 24px; display: flex; flex-direction: column; gap: 4px; }

  .grocery-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
    animation: slideIn 0.3s var(--ease-spring);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .grocery-item:hover { background: var(--gray-1); }
  .grocery-item.checked { opacity: 0.45; }

  .check-circle {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--gray-2);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s var(--ease-spring);
    font-size: 0.7rem;
    color: #fff;
  }
  .grocery-item.checked .check-circle {
    background: var(--orange);
    border-color: var(--orange);
  }
  .grocery-item-name {
    font-size: 0.93rem;
    font-weight: 500;
    color: var(--black);
    flex: 1;
    transition: text-decoration 0.2s;
  }
  .grocery-item.checked .grocery-item-name { text-decoration: line-through; color: var(--gray-3); }
  .grocery-item-del {
    opacity: 0;
    font-size: 1rem;
    color: var(--gray-3);
    transition: opacity 0.15s;
    cursor: pointer;
    padding: 2px 4px;
  }
  .grocery-item:hover .grocery-item-del { opacity: 1; }

  .grocery-category-header {
    padding: 14px 24px 6px;
    font-family: 'Raleway', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray-3);
  }

  .grocery-divider {
    margin: 16px 24px;
    height: 1px;
    background: var(--gray-2);
  }

  .clear-btn {
    margin: 0 24px;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--gray-4);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    text-align: left;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: var(--orange); }

  /* ── RECIPES ── */
  .recipes-header { padding: 0 24px 16px; }
  .recipes-title {
    font-family: 'Raleway', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--black);
    margin-bottom: 4px;
  }
  .recipes-sub { font-size: 0.82rem; color: var(--gray-4); }

  .recipe-search {
    margin: 0 24px 20px;
    background: var(--gray-1);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--gray-3);
    font-size: 0.88rem;
    cursor: text;
  }
  .recipe-search input {
    border: none; background: transparent; outline: none;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.88rem; color: var(--black); flex: 1;
  }
  .recipe-search input::placeholder { color: var(--gray-3); }

  .recipe-filters {
    display: flex;
    gap: 8px;
    padding: 0 24px 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-chip {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s var(--ease-spring);
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .filter-chip:hover { transform: scale(1.05); }
  .filter-chip.active { background: var(--black); color: #fff; }
  .filter-chip:not(.active) { background: var(--gray-1); color: var(--gray-4); }

  .recipe-list { padding: 0 24px; display: flex; flex-direction: column; gap: 8px; }

  .recipe-card {
    background: var(--gray-1);
    border-radius: var(--radius-md);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: transform 0.2s var(--ease-spring), box-shadow 0.2s;
  }
  .recipe-card:hover { transform: scale(1.02); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }

  .recipe-emoji {
    width: 52px; height: 52px;
    border-radius: var(--radius-sm);
    background: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .recipe-info { flex: 1; min-width: 0; }
  .recipe-name {
    font-family: 'Raleway', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--black);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .recipe-meta { font-size: 0.72rem; color: var(--gray-4); margin-top: 3px; }
  .recipe-badge {
    flex-shrink: 0;
    font-size: 0.65rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 100px;
    background: var(--orange-light);
    color: var(--orange);
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .recipe-add-card {
    border: 2px dashed var(--gray-2);
    border-radius: var(--radius-md);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin: 0 24px;
    margin-top: 8px;
  }
  .recipe-add-card:hover { border-color: var(--orange); background: var(--orange-light); }
  .recipe-add-card-label { font-family: 'Raleway', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--gray-3); }
  .recipe-add-card:hover .recipe-add-card-label { color: var(--orange); }

  /* ── FRIDGE AI ── */
  /* ── ADD RECIPE MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 28px 28px 0 0;
    padding: 28px 24px 40px;
    width: 100%;
    max-width: 430px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.4s var(--ease-spring);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--gray-2);
    border-radius: 2px;
    margin: 0 auto 24px;
  }
  .modal-title {
    font-family: 'Raleway', sans-serif;
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--black);
    margin-bottom: 20px;
  }
  .modal-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--gray-4);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    display: block;
  }
  .modal-input, .modal-textarea {
    width: 100%;
    background: var(--gray-1);
    border: none;
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--black);
    outline: none;
    margin-bottom: 14px;
    transition: background 0.2s;
  }
  .modal-input:focus, .modal-textarea:focus { background: var(--gray-2); }
  .modal-textarea { resize: none; height: 90px; line-height: 1.5; }

  .modal-save-btn {
    width: 100%;
    padding: 15px;
    background: var(--orange);
    border: none;
    border-radius: var(--radius-md);
    font-family: 'Raleway', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    color: #fff;
    cursor: pointer;
    transition: transform 0.2s var(--ease-spring), background 0.15s;
    margin-top: 6px;
  }
  .modal-save-btn:hover { transform: scale(1.02); background: #e85a24; }

  /* ── RECIPE DETAIL MODAL ── */
  .detail-modal {
    position: fixed;
    inset: 0;
    background: var(--white);
    z-index: 200;
    display: none;
    flex-direction: column;
    overflow-y: auto;
    animation: slideInRight 0.35s var(--ease-out);
  }
  .detail-modal.open { display: flex; }
  @keyframes slideInRight {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }

  .detail-top {
    padding: 52px 24px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .detail-back {
    background: var(--gray-1);
    border: none;
    border-radius: 50%;
    width: 40px; height: 40px;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .detail-back:hover { background: var(--gray-2); }

  .detail-add-grocery {
    background: var(--orange-light);
    border: none;
    border-radius: 100px;
    padding: 9px 16px;
    font-family: 'Raleway', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--orange);
    cursor: pointer;
    transition: background 0.15s;
  }
  .detail-add-grocery:hover { background: var(--orange-mid); }

  .detail-hero {
    font-size: 5rem;
    text-align: center;
    padding: 10px 0 20px;
  }
  .detail-name {
    font-family: 'Raleway', sans-serif;
    font-size: 1.7rem;
    font-weight: 800;
    color: var(--black);
    padding: 0 24px;
    margin-bottom: 6px;
  }
  .detail-meta {
    font-size: 0.8rem;
    color: var(--gray-4);
    padding: 0 24px;
    margin-bottom: 24px;
    display: flex; gap: 12px;
  }
  .detail-section {
    padding: 0 24px;
    margin-bottom: 20px;
  }
  .detail-section-title {
    font-family: 'Raleway', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gray-3);
    margin-bottom: 12px;
  }
  .detail-ingredient {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--gray-2);
    font-size: 0.88rem;
    color: var(--black);
  }
  .detail-ingredient:last-child { border-bottom: none; }
  .detail-ingredient-dot {
    width: 6px; height: 6px;
    background: var(--orange);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .detail-steps { display: flex; flex-direction: column; gap: 6px; }
  .detail-step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--black);
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .detail-step:hover { background: var(--gray-1); }
  .detail-step.done { background: var(--gray-1); }
  .detail-step.done .detail-step-text { color: var(--gray-3); text-decoration: line-through; }
  .detail-step.done .detail-step-check { background: var(--orange); border-color: var(--orange); }
  .detail-step-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--gray-2);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    color: #fff;
    transition: all 0.2s var(--ease-spring);
  }
  .detail-step-num {
    font-family: 'Raleway', sans-serif;
    font-weight: 800;
    color: var(--orange);
    font-size: 0.85rem;
    flex-shrink: 0;
    min-width: 22px;
    padding-top: 2px;
  }
  .detail-step.done .detail-step-num { color: var(--gray-3); }
  .detail-step-text { flex: 1; }

  /* ── COOKING MODE ── */
  .cooking-modal {
    position: fixed;
    inset: 0;
    background: #111;
    z-index: 300;
    display: none;
    flex-direction: column;
    animation: fadeIn 0.35s var(--ease-out);
  }
  .cooking-modal.open { display: flex; }

  .cooking-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .cooking-title-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cooking-emoji { font-size: 1.5rem; }
  .cooking-recipe-name {
    font-family: 'Raleway', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    color: #fff;
  }
  .cooking-close {
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 50%;
    width: 36px; height: 36px;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .cooking-close:hover { background: rgba(255,255,255,0.18); }

  /* Step progress bar */
  .cooking-progress {
    height: 3px;
    background: rgba(255,255,255,0.1);
    flex-shrink: 0;
    position: relative;
  }
  .cooking-progress-fill {
    height: 100%;
    background: var(--orange);
    border-radius: 2px;
    transition: width 0.4s var(--ease-out);
  }

  /* Two-column landscape layout */
  .cooking-body {
    flex: 1;
    display: grid;
    grid-template-columns: 280px 1fr;
    overflow: hidden;
  }

  /* Left: ingredients */
  .cooking-ingredients-panel {
    border-right: 1px solid rgba(255,255,255,0.08);
    overflow-y: auto;
    padding: 24px 20px;
  }
  .cooking-ingredients-panel::-webkit-scrollbar { width: 4px; }
  .cooking-ingredients-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .cooking-panel-label {
    font-family: 'Raleway', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 14px;
  }

  .cooking-ingredient-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 0.88rem;
    color: rgba(255,255,255,0.7);
  }
  .cooking-ingredient-item:hover { background: rgba(255,255,255,0.05); }
  .cooking-ingredient-item.ticked { color: rgba(255,255,255,0.25); text-decoration: line-through; }

  .cooking-ing-check {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    color: #fff;
    transition: all 0.2s var(--ease-spring);
  }
  .cooking-ingredient-item.ticked .cooking-ing-check {
    background: var(--orange);
    border-color: var(--orange);
  }

  /* Right: steps */
  .cooking-steps-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 24px 28px;
  }

  .cooking-step-counter {
    font-family: 'Raleway', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 16px;
  }

  .cooking-step-content {
    flex: 1;
    display: flex;
    align-items: center;
  }

  .cooking-step-num-big {
    font-family: 'Raleway', sans-serif;
    font-size: 5rem;
    font-weight: 800;
    color: rgba(255,255,255,0.06);
    line-height: 1;
    margin-right: 20px;
    flex-shrink: 0;
    user-select: none;
  }

  .cooking-step-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    font-weight: 400;
    color: #fff;
    line-height: 1.6;
    animation: stepFadeIn 0.35s var(--ease-out);
  }
  @keyframes stepFadeIn {
    from { opacity: 0; transform: translateY(10px); }

];

function categorize(name) {
  const lower = name.toLowerCase();
  for (const cat of CATEGORIES) {
    if (cat.words.some(w => lower.includes(w))) return cat.key;
  }
  return 'other';
}

function getCategoryLabel(key) {
  const cat = CATEGORIES.find(c => c.key === key);
  return cat ? cat.label : '🛍️ Övrigt';
}

// ── GROCERY ──
function renderGrocery() {
  const list = document.getElementById('grocery-list');
  const count = document.getElementById('grocery-count');
  const divider = document.getElementById('grocery-divider');
  const clearBtn = document.getElementById('clear-checked');
  const unchecked = groceryItems.filter(i => !i.checked);
  const checked = groceryItems.filter(i => i.checked);
  count.textContent = groceryItems.length + (groceryItems.length !== 1 ? ' varor' : ' vara');
  list.innerHTML = '';

  // Group unchecked items by category
  const groups = {};
  unchecked.forEach(item => {
    const cat = item.category || categorize(item.name);
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(item);
  });

  // Render unchecked items grouped by category
  Object.entries(groups).forEach(([cat, items]) => {
    const header = document.createElement('div');
    header.className = 'grocery-category-header';
    header.textContent = getCategoryLabel(cat);
    list.appendChild(header);
    items.forEach(item => appendGroceryItem(list, item));
  });

  // Render checked items flat at the bottom
  checked.forEach(item => appendGroceryItem(list, item));

  function appendGroceryItem(list, item) {
    const el = document.createElement('div');
    el.className = 'grocery-item' + (item.checked ? ' checked' : '');
    el.innerHTML = `
      <div class="check-circle">${item.checked ? '✓' : ''}</div>
      <div class="grocery-item-name">${item.name}</div>
      <span class="grocery-item-del" data-id="${item.id}">✕</span>
    `;
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('grocery-item-del')) {
        groceryItems = groceryItems.filter(i => i.id !== item.id);
        saveGrocery(); renderGrocery();
      } else {
        item.checked = !item.checked;
        saveGrocery(); renderGrocery();
      }
    });
    list.appendChild(el);
  }

  const hasChecked = checked.length > 0;
  const isEmpty = groceryItems.length === 0;
  divider.style.display = hasChecked ? 'block' : 'none';
  clearBtn.style.display = hasChecked ? 'block' : 'none';
  document.getElementById('grocery-empty').style.display = isEmpty ? 'block' : 'none';
  document.getElementById('grocery-section-label').style.display = isEmpty ? 'none' : 'block';
}

document.getElementById('grocery-add-btn').addEventListener('click', addGroceryItem);
document.getElementById('grocery-input').addEventListener('keydown', e => { if (e.key === 'Enter') addGroceryItem(); });

function addGroceryItem() {
  const input = document.getElementById('grocery-input');
  const val = input.value.trim();
  if (!val) return;
  groceryItems.push({ id: Date.now(), name: val, checked: false, category: categorize(val) });
  input.value = '';
  saveGrocery();
  renderGrocery();
}

document.getElementById('clear-checked').addEventListener('click', () => {
  groceryItems = groceryItems.filter(i => !i.checked);
  saveGrocery(); renderGrocery();
});

// ── RECIPES ──
function renderRecipes() {
  const list = document.getElementById('recipe-list');
  const count = document.getElementById('recipe-count');
  const search = document.getElementById('recipe-search').value.toLowerCase();
  count.textContent = recipes.length + (recipes.length !== 1 ? ' recept sparade' : ' recept sparat');
  list.innerHTML = '';

  const filtered = recipes.filter(r => {
    const matchFilter = activeFilter === 'all' ||
      (activeFilter === 'quick' && r.meta.includes('min') && parseInt(r.meta) <= 30) ||
      (activeFilter === 'family' && r.tag.toLowerCase().includes('family')) ||
      (activeFilter === 'veggie' && (r.tag.toLowerCase().includes('veggie') || r.tag.toLowerCase().includes('veg')));
    const matchSearch = r.name.toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });

  filtered.forEach(recipe => {
    const el = document.createElement('div');
    el.className = 'recipe-card';
    el.innerHTML = `
      <div class="recipe-emoji">${recipe.emoji}</div>
      <div class="recipe-info">
        <div class="recipe-name">${recipe.name}</div>
        <div class="recipe-meta">${recipe.meta}</div>
      </div>
      <div class="recipe-badge">${recipe.tag}</div>
    `;
    el.addEventListener('click', () => openRecipeDetail(recipe));
    list.appendChild(el);
  });
}

document.getElementById('recipe-search').addEventListener('input', renderRecipes);

document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    activeFilter = chip.dataset.filter;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c === chip));
    renderRecipes();
  });
});

// ── RECIPE DETAIL ──
function openRecipeDetail(recipe) {
  currentRecipe = recipe;
  document.getElementById('detail-emoji').textContent = recipe.emoji;
  document.getElementById('detail-name').textContent = recipe.name;
  document.getElementById('detail-meta').innerHTML = `<span>⏱ ${recipe.meta}</span><span>🏷 ${recipe.tag}</span>`;
  const ingDiv = document.getElementById('detail-ingredients');
  ingDiv.innerHTML = (recipe.ingredients || []).map(i => `
    <div class="detail-ingredient"><div class="detail-ingredient-dot"></div>${i}</div>
  `).join('');
  const stepsDiv = document.getElementById('detail-steps');
  stepsDiv.innerHTML = (recipe.steps || []).map((s, i) => `
    <div class="detail-step" data-step="${i}">
      <div class="detail-step-num">${String(i+1).padStart(2,'0')}</div>
      <div class="detail-step-check"></div>
      <div class="detail-step-text">${s}</div>
    </div>
  `).join('');
  stepsDiv.querySelectorAll('.detail-step').forEach(el => {
    el.addEventListener('click', () => {
      el.classList.toggle('done');
      el.querySelector('.detail-step-check').textContent = el.classList.contains('done') ? '✓' : '';
    });
  });
  document.getElementById('detail-modal').classList.add('open');
}

document.getElementById('detail-back').addEventListener('click', () => {
  document.getElementById('detail-modal').classList.remove('open');
});

document.getElementById('detail-add-grocery').addEventListener('click', () => {
  if (!currentRecipe) return;
  const newItems = (currentRecipe.ingredients || []).map(ing => ({
    id: Date.now() + Math.random(),
    name: ing,
    checked: false
  }));
  groceryItems.push(...newItems);
  saveGrocery();
  showToast(`${newItems.length} ingredienser tillagda i inköpslistan 🛒`);
  document.getElementById('detail-modal').classList.remove('open');
  switchTab('grocery');
  renderGrocery();
});

// ── ADD RECIPE MODAL ──
document.getElementById('recipe-add-btn').addEventListener('click', () => {
  document.getElementById('add-modal').classList.add('open');
});
document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('add-modal')) {
    document.getElementById('add-modal').classList.remove('open');
  }
});

document.getElementById('modal-save-btn').addEventListener('click', () => {
  const name = document.getElementById('recipe-name-input').value.trim();
  if (!name) { showToast('Lägg till ett receptnamn'); return; }
  const recipe = {
    id: Date.now(),
    name,
    emoji: document.getElementById('recipe-emoji-input').value.trim() || '🍽',
    meta: document.getElementById('recipe-meta-input').value.trim() || '— min',
    tag: document.getElementById('recipe-tag-input').value.trim() || 'Other',
    ingredients: document.getElementById('recipe-ingredients-input').value.trim().split('\n').filter(Boolean),
    steps: document.getElementById('recipe-steps-input').value.trim().split('\n').filter(Boolean)
  };
  recipes.unshift(recipe);
  saveRecipes();
  renderRecipes();
  document.getElementById('add-modal').classList.remove('open');
  ['recipe-name-input','recipe-emoji-input','recipe-meta-input','recipe-tag-input','recipe-ingredients-input','recipe-steps-input'].forEach(id => document.getElementById(id).value = '');
  showToast('Recept sparat! 🎉');
});

// ── COOKING MODE ──
let cookingStep = 0;
let cookingIngTicked = [];

function openCookingMode(recipe) {
  cookingStep = 0;
  cookingIngTicked = new Array(recipe.ingredients.length).fill(false);

  document.getElementById('cooking-emoji').textContent = recipe.emoji;
  document.getElementById('cooking-name').textContent = recipe.name;
  document.getElementById('cooking-done-sub').textContent = `You just made ${recipe.name} 🍽`;

  // Ingredients
  const ingList = document.getElementById('cooking-ingredients-list');
  ingList.innerHTML = (recipe.ingredients || []).map((ing, i) => `
    <div class="cooking-ingredient-item" data-idx="${i}">
      <div class="cooking-ing-check"></div>
      <span>${ing}</span>
    </div>
  `).join('');
  ingList.querySelectorAll('.cooking-ingredient-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      cookingIngTicked[idx] = !cookingIngTicked[idx];
      el.classList.toggle('ticked', cookingIngTicked[idx]);
      el.querySelector('.cooking-ing-check').textContent = cookingIngTicked[idx] ? '✓' : '';
    });
  });

  document.getElementById('cooking-body').style.display = 'grid';
  document.getElementById('cooking-done').classList.remove('visible');
  document.getElementById('cooking-modal').classList.add('open');
  renderCookingStep(recipe);
}

function renderCookingStep(recipe) {
  const steps = recipe.steps || [];
  const total = steps.length;
  const pct = ((cookingStep + 1) / total) * 100;

  document.getElementById('cooking-step-counter').textContent = `Step ${cookingStep + 1} of ${total}`;
  document.getElementById('cooking-step-num-big').textContent = String(cookingStep + 1).padStart(2, '0');

  // Re-render for animation
  const textEl = document.getElementById('cooking-step-text');
  textEl.style.animation = 'none';
  textEl.offsetHeight; // reflow
  textEl.style.animation = '';
  textEl.textContent = steps[cookingStep];

  document.getElementById('cooking-progress-fill').style.width = pct + '%';

  const prevBtn = document.getElementById('cooking-prev');
  const nextBtn = document.getElementById('cooking-next');
  prevBtn.disabled = cookingStep === 0;

  if (cookingStep === total - 1) {
    nextBtn.textContent = '🎉 Finish';
    nextBtn.className = 'cooking-nav-btn done';
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.className = 'cooking-nav-btn next';
  }
}

document.getElementById('detail-cook-btn').addEventListener('click', () => {
  if (!currentRecipe) return;
  openCookingMode(currentRecipe);
});

document.getElementById('cooking-prev').addEventListener('click', () => {
  if (cookingStep > 0) { cookingStep--; renderCookingStep(currentRecipe); }
});

document.getElementById('cooking-next').addEventListener('click', () => {
  const steps = currentRecipe.steps || [];
  if (cookingStep < steps.length - 1) {
    cookingStep++;
    renderCookingStep(currentRecipe);
  } else {
    // Show done screen
    document.getElementById('cooking-body').style.display = 'none';
    document.getElementById('cooking-done').classList.add('visible');
    document.getElementById('cooking-progress-fill').style.width = '100%';
  }
});

document.getElementById('cooking-close').addEventListener('click', () => {
  document.getElementById('cooking-modal').classList.remove('open');
});

document.getElementById('cooking-done-btn').addEventListener('click', () => {
  document.getElementById('cooking-modal').classList.remove('open');
});


switchTab('grocery');
renderGrocery();
renderRecipes();
</script>
